name: Deploy

# Builds the site with live Sanity content and deploys to Cloudflare Pages.
# Triggers:
#   - push to main (code changes)
#   - repository_dispatch "sanity-publish" (content published in the dashboard,
#     fired by a Sanity webhook -> GitHub dispatch)
#   - manual run (workflow_dispatch button in the Actions tab)

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-publish]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check:i18n
      - run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: production
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name jci-el-alia --branch main --commit-dirty=true
          workingDirectory: web
