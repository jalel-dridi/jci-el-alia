name: CI

# Build the site (and studio) on every push / PR so broken builds are caught
# before Cloudflare Pages deploys. Uses placeholder Sanity env -> seed fallback.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check:i18n
      - run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: placeholder
          PUBLIC_SANITY_DATASET: production

  build-studio:
    name: Build admin dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
      - run: npx sanity build
        env:
          SANITY_STUDIO_PROJECT_ID: placeholder
          SANITY_STUDIO_DATASET: production
